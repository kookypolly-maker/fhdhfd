<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Жаба на кувшинках · Liquid Glass</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-container">
        <div class="glass-panel score-panel">
            <div class="score-item">
                <span class="score-label">Счёт</span>
                <span id="scoreValue" class="score-value">0</span>
                <div class="glass-shine"></div>
            </div>
            <div class="score-divider"></div>
            <div class="score-item">
                <span class="score-label">Прыжков</span>
                <span id="movesValue" class="score-value">0</span>
                <div class="glass-shine"></div>
            </div>
            <button id="restartButton" class="glass-button">
                <span class="button-text">↻ Новая игра</span>
                <div class="button-glow"></div>
            </button>
        </div>

        <div class="game-wrapper">
            <canvas id="gameCanvas" width="700" height="450"></canvas>
            <div class="glass-instruction">
                <span class="instruction-arrow">⬆️</span>
                <span class="instruction-arrow">⬇️</span>
                <span class="instruction-arrow">⬅️</span>
                <span class="instruction-arrow">➡️</span>
                <span class="instruction-text">прыгай на любую</span>
                <div class="instruction-glow"></div>
            </div>
        </div>
    </div>

    <div class="background-bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
